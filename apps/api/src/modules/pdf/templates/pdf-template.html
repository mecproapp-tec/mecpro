<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <style>
    body { font-family: Arial; padding: 20px; }
    h1 { color: #333; }
    table { width: 100%; border-collapse: collapse; margin-top: 20px; }
    th, td { border: 1px solid #ccc; padding: 8px; }
    th { background: #eee; }
  </style>
</head>
<body>
  <h1>Orçamento</h1>

  <p><strong>Cliente:</strong> {{client.name}}</p>
  <p><strong>Data:</strong> {{date}}</p>

  <table>
    <thead>
      <tr>
        <th>Descrição</th>
        <th>Qtd</th>
        <th>Preço</th>
        <th>Total</th>
      </tr>
    </thead>
    <tbody>
      {{#each items}}
      <tr>
        <td>{{description}}</td>
        <td>{{quantity}}</td>
        <td>R$ {{price}}</td>
        <td>R$ {{total}}</td>
      </tr>
      {{/each}}
    </tbody>
  </table>

  <h2>Total: R$ {{total}}</h2>
</body>
</html>
