<!-- src/modules/pdf/templates/pdf-template.html -->
<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Documento</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      font-size: 12px;
    }
    .container {
      width: 100%;
      max-width: 210mm;
      margin: 0 auto;
      padding: 5mm;
    }
    h1 {
      font-size: 18px;
      margin-bottom: 10px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
    }
    th, td {
      border: 1px solid #ddd;
      padding: 8px;
      text-align: left;
    }
    th {
      background-color: #f2f2f2;
    }
    @media print {
      body {
        margin: 0;
        padding: 0;
      }
      .container {
        margin: 0;
        padding: 0;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>{{title}}</h1>
    <p>Cliente: {{clientName}}</p>
    <p>Data: {{date}}</p>
    <table>
      <thead>
        <tr>
          <th>Serviço</th>
          <th>Quantidade</th>
          <th>Valor</th>
        </tr>
      </thead>
      <tbody>
        {{#each items}}
        <tr>
          <td>{{this.name}}</td>
          <td>{{this.quantity}}</td>
          <td>{{this.price}}</td>
        </tr>
        {{/each}}
      </tbody>
    </table>
    <p><strong>Total: {{total}}</strong></p>
  </div>
</body>
</html>
